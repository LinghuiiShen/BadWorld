  - title: Key Takeaway
    text: |
      Visual world models are becoming interactive simulators, but their fragile dynamics suggest they <span class="badworld-emph">have not truly learned stable physical knowledge</span>.

      <span class="badworld-red">BadWorld</span> shows that tiny, imperceptible changes to a single input image can severely corrupt future rollouts.
      This reveals a critical robustness gap for <span class="badworld-emph">safety-critical deployment</span> and a practical path for <span class="badworld-emph">privacy protection</span>.

