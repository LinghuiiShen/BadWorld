      <div class="badworld-level2-heading">
      <span class="badworld-level2-index">2</span>
      <span>Trajectory-Adaptive Optimization</span>
      </div>

      BadWorld further improves the perturbation by considering that future user controls are unknown and may vary. 

      It actively searches for <span class="badworld-emph">hard trajectories</span> where the current perturbation is less effective, then updates the perturbation against these challenging controls. This makes the adversarial image more robust across different camera paths or action sequences, leading to <span class="badworld-emph">stronger degradation and better generalization</span>.

