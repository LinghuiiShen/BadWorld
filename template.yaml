body:
  - title: 'TL;DR'
    text: |
      We introduce <span style="color:#d32f2f; font-weight:700;">BadWorld</span>, a label-free adversarial attack for visual world models. 

      Starting from a single perturbed context image, <span style="color:#d32f2f; font-weight:700;">BadWorld</span> reliably causes future rollouts to break down across unseen user controls, revealing severe robustness risks in current VWMs.

