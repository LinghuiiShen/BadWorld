      <div class="badworld-level2-heading">
      <span class="badworld-level2-index">1</span>
      <span>Label-Free Velocity Attack Objectives</span>
      </div>

      BadWorld attacks the world model without requiring any ground-truth future video or predefined correct rollout.

      We introduce four self-supervised objectives: (1) <span class="badworld-emph">Velocity-Max</span>, amplifying denoising updates; (2) <span class="badworld-emph">Velocity-Min</span>, suppressing denoising updates; (3) <span class="badworld-emph">Drift-Max</span>, encouraging semantic drift; and (4) <span class="badworld-emph">Drift-Min</span>, inducing motion collapse.
      For all objectives, we approximate the history using repeated clean contexts and constrain the attack to early denoising timesteps.

      Among them, we choose <span class="badworld-emph">Velocity-Min</span> as the final objective, since it consistently achieves strong attack effectiveness on both Matrix-Game-2.0 and Astra.

